<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF → Metadata & Fonts Extractor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>PDF → Metadata & Fonts Extractor</h1>

    <div id="drop-area" class="drop">
      <div class="icon">📄</div>
      <div class="prompt">Drag & drop a PDF here</div>
      <div class="or">or</div>
      <label class="btn">Choose a file
        <input id="fileElem" type="file" accept="application/pdf">
      </label>
      <div class="hint">Max file size: 20 MB</div>
    </div>

    <div id="meta" class="meta hidden">
      <div id="file-info"></div>

      <div class="actions">
        <button id="xmpBtn" class="btn primary" disabled>Download XMP</button>
        <button id="fontsBtn" class="btn secondary" disabled>Download Fonts JSON</button>
        <button id="reportBtn" class="btn accent" disabled>Download Full Report</button>
      </div>
      
      <div class="hint">
        XMP → XML | Fonts → JSON | Report → Full metadata + A11Y info
      </div>

      <div id="status" class="status"></div>
    </div>

    <footer class="foot">
      Run locally or deploy to Render / Railway / Vercel
    </footer>
  </main>

  <script src="/script.js"></script>
</body>
</html>
